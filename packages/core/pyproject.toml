[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sunat-py"
version = "0.3.0"
description = "Comprobantes electrónicos SUNAT (Perú) desde Python: factura, boleta, NC, ND, GRE remitente, comunicación de baja y resumen diario. UBL 2.1, XMLDSig, SOAP y REST. En desarrollo activo."
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
authors = [
    { name = "Luis Luza M.", email = "userDKX@users.noreply.github.com" },
]
keywords = [
    "sunat",
    "sunat-peru",
    "electronic-invoicing",
    "ubl-2.1",
    "xmldsig",
    "peru",
    "factura-electronica",
    "boleta-electronica",
    "nota-credito",
    "nota-debito",
    "comunicacion-baja",
    "resumen-diario",
    "guia-remision",
    "gre",
    "validator",
    "sdk",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Natural Language :: Spanish",
]
dependencies = [
    "lxml>=5.3,<6",
    "jinja2>=3.1,<4",
    "signxml>=4.0,<5",
    "cryptography>=44,<45",
    "zeep>=4.3,<5",
    "requests>=2.31,<3",
]

[project.urls]
Homepage = "https://github.com/userDKX/SIS-Facturador"
Repository = "https://github.com/userDKX/SIS-Facturador"
Issues = "https://github.com/userDKX/SIS-Facturador/issues"
Changelog = "https://github.com/userDKX/SIS-Facturador/blob/main/packages/core/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"sunat_py" = ["py.typed"]
"sunat_py.ubl" = ["templates/*.j2"]
"sunat_py.sunat" = ["wsdl/**/*.wsdl", "wsdl/**/*.xsd"]

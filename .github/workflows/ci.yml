name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy app/ || true
        # `|| true` mientras estabilizamos los tipos (signxml/zeep no tienen
        # stubs completos). Quitar cuando mypy app/ pase clean.

  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: Run pytest (skip beta tests, no SUNAT contact)
        env:
          # Envs mínimos para que pydantic-settings no truene al importar
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          SUNAT_RUC: "20000000001"
          SUNAT_USER: "MODDATOS"
          SUNAT_PASSWORD: "MODDATOS"
          CERT_PFX_BASE64: ""
          CERT_PASSWORD: "MODDATOS"
        run: pytest -m "not beta" --cov=app --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7
